    <script>
        // // 检测URL参数，如果存在 type=filter，则自动打开筛选菜单
        function autoOpenFilterMenu() {
            const urlParams = new URLSearchParams(window.location.search);
            console.log('URL参数:', urlParams.get('type')); // 调试日志
            
            if (urlParams.get('type') === 'filter') {
                console.log('检测到 type=filter，正在打开筛选菜单');
                
                const filterMenu = document.getElementById('filterMenu');
                const filterBtn = document.querySelector('.filter-btn');
                
                if (filterMenu) {
                    // // 方法1：直接设置 display
                    filterMenu.style.display = 'block';
                    filterMenu.classList.add('active');
                    
                    // 禁止背景滚动
                    document.body.style.overflow = 'hidden';
                    document.documentElement.style.overflow = 'hidden';
                    
                    // 创建遮罩层
                    let overlay = document.querySelector('.filter-overlay');
                    if (!overlay) {
                        overlay = document.createElement('div');
                        overlay.className = 'filter-overlay';
                        overlay.style.display = 'block';
                        document.body.appendChild(overlay);
                        // 点击遮罩层关闭菜单
                        overlay.onclick = toggleFilterMenu;
                    } else {
                        overlay.style.display = 'block';
                    }
                    
                    console.log('筛选菜单已显示 (display: block)');
                }
                
                if (filterBtn) {
                    // // 方法2：添加活跃类
                    filterBtn.classList.add('active');
                }
            }
        }
    </script>
